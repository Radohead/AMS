version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    environment:
      - DATABASE_URL=mysql+pymysql://ams:ams123@mysql:3306/ams
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - mysql
    networks:
      - ams-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - ams-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=ams
      - MYSQL_USER=ams
      - MYSQL_PASSWORD=ams123
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ams-network

networks:
  ams-network:
    driver: bridge

volumes:
  uploads:
  mysql-data:
